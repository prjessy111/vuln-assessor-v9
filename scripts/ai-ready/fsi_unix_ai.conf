# fsi_unix_ai.sh collection scope configuration
#
# Load order:
#   1) --config /path/to/fsi_unix_ai.conf
#   2) FSI_CONFIG_PATH=/path/to/fsi_unix_ai.conf
#   3) fsi_unix_ai.conf in the same directory as the script
#   4) /etc/lsware/fsi_unix_ai.conf
#   5) /etc/fsi_unix_ai.conf
#
# Use whitespace-separated paths. Paths containing spaces are not supported.

# In fast mode, expensive find scans are skipped by default.
# Set to 1 to scan only the configured directories below even in fast mode.
FSI_ENABLE_FAST_FIND=0

# Home directory scans for SRV-091, SRV-093, SRV-095.
# Empty value means auto-detect shell users' home directories from /etc/passwd.
FSI_HOME_SCAN_DIRS=""

# /etc world-writable file scan scope for CRONTAB evidence.
FSI_ETC_SCAN_DIRS="/etc"

# /dev regular file scan scope for SRV-144 evidence.
FSI_DEV_SCAN_DIRS="/dev"

# Fast-mode output limits.
FSI_NETSTAT_LIMIT=200
FSI_PS_LIMIT=200
FSI_LAST_LIMIT=50
FSI_LASTLOG_LIMIT=200

# Fast-mode optional slow evidence.
FSI_ENABLE_LASTLOG=0
FSI_ENABLE_INTERFACETABLE=0
FSI_ENABLE_PATCHINFO=0

# External telnet HTTP probes are skipped in fast mode by default.
FSI_ENABLE_EXTERNAL_PROBES=0
FSI_EXTERNAL_SITES="103.59.159.20 211.117.39.44"
